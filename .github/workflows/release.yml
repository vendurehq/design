name: Release

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Generate bot token
        id: bot-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CI_BOT_APP_ID }}
          private-key: ${{ secrets.CI_BOT_APP_PRIVATE_KEY }}

      - name: Get bot user ID
        id: get-user
        run: echo "user-id=$(gh api "/users/${{ steps.bot-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.bot-token.outputs.token }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Update package versions
        run: |
          for pkg in packages/*/package.json; do
            jq --arg v "${{ steps.version.outputs.VERSION }}" '.version = $v' "$pkg" > tmp.json && mv tmp.json "$pkg"
          done

      - name: Build
        run: bun run build

      - name: Publish @vendure-io/design-tokens
        run: npm publish --provenance --access public
        working-directory: packages/design-tokens
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vendure-io/ui
        run: npm publish --provenance --access public
        working-directory: packages/ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        run: |
          git config user.name "${{ steps.bot-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.get-user.outputs.user-id }}+${{ steps.bot-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git add packages/*/package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.VERSION }}"
          git push origin HEAD:main
